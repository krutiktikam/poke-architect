services:
  - type: web
    name: poke-architect-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.main:app
    envVars:
      - key: DATABASE_URL
        sync: false # You will set this in the Render UI
      - key: ALLOWED_ORIGINS
        value: "*" # We'll restrict this after frontend is live
      - key: PYTHON_VERSION
        value: 3.11.0
